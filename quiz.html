
<!DOCTYPE html>
<html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alma — Find Your Pattern</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F2EDE6;
      --card: #FDFAF7;
      --rose: #4D1C33;
      --rose-light: #9e6878;
      --rose-pale: #f0e4e8;
      --charcoal: #1A1210;
      --muted: #4A4340;
      --gold: #8C6F4E;
      --border: #DDD6CC;
    }
    html, body { min-height: 100%; background: var(--bg); color: var(--charcoal); font-family: 'DM Sans', sans-serif; font-weight: 400; -webkit-font-smoothing: antialiased; }
    #root { min-height: 100vh; }

    .screen-enter { animation: fadeSlideIn 0.45s ease forwards; }
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

    .progress-bar-track { position: fixed; top: 0; left: 0; right: 0; height: 3px; background: var(--border); z-index: 100; }
    .progress-bar-fill { height: 100%; background: var(--rose); transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }

    .header { display: flex; align-items: center; justify-content: center; padding: 24px 24px 0; position: relative; }
    .sofia-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--rose-pale); border: 1.5px solid var(--rose-light); display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 15px; color: var(--rose); font-style: italic; }
    .brand-name { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 500; color: var(--charcoal); letter-spacing: 0.04em; margin-left: 10px; }
    .back-btn { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--muted); display: flex; align-items: center; gap: 4px; font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 6px; transition: color 0.2s; }
    .back-btn:hover { color: var(--charcoal); }

    .page { max-width: 560px; margin: 0 auto; padding: 0 24px 80px; }

    .intro-eyebrow { font-size: 11px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--rose); margin-bottom: 20px; }
    .intro-headline { font-family: 'Playfair Display', serif; font-size: clamp(26px,6vw,38px); font-weight: 500; line-height: 1.25; color: var(--charcoal); margin-bottom: 20px; text-wrap: pretty; }
    .intro-headline em { font-style: italic; color: var(--rose); }
    .intro-sub { font-size: 15px; line-height: 1.65; color: var(--muted); margin-bottom: 40px; text-wrap: pretty; }

    .btn-primary { display: inline-flex; align-items: center; gap: 8px; background: var(--rose); color: #fff; border: none; border-radius: 100px; padding: 16px 36px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; letter-spacing: 0.02em; transition: background 0.2s, transform 0.15s; width: 100%; justify-content: center; }
    .btn-primary:hover { background: #3a1426; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .meta-note { font-size: 12px; color: var(--muted); text-align: center; margin-top: 16px; letter-spacing: 0.02em; }

    .intro-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 28px 24px; margin-bottom: 36px; }
    .intro-card-quote { font-family: 'Playfair Display', serif; font-size: 15px; font-style: italic; line-height: 1.65; color: var(--muted); position: relative; padding-left: 16px; }
    .intro-card-quote::before { content: ''; position: absolute; left: 0; top: 4px; bottom: 4px; width: 2px; background: var(--rose-light); border-radius: 1px; }
    .intro-card-name { font-size: 12px; color: var(--rose); margin-top: 14px; font-weight: 500; letter-spacing: 0.06em; }

    .q-number { font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--rose); margin-bottom: 12px; }
    .q-text { font-family: 'Playfair Display', serif; font-size: clamp(20px,5vw,26px); font-weight: 500; line-height: 1.35; color: var(--charcoal); margin-bottom: 32px; text-wrap: pretty; }
    .answer-options { display: flex; flex-direction: column; gap: 10px; }
    .answer-pill { background: var(--card); border: 1.5px solid var(--border); border-radius: 100px; padding: 14px 22px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 400; color: var(--charcoal); cursor: pointer; text-align: left; transition: all 0.2s; line-height: 1.4; }
    .answer-pill:hover { border-color: var(--rose-light); background: var(--rose-pale); color: var(--rose); }
    .answer-pill.selected { background: var(--rose); border-color: var(--rose); color: #fff; }
    .answer-pill.tiebreaker { border-radius: 14px; padding: 16px 22px; }

    .processing-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center; gap: 32px; }
    .pulse-ring { width: 80px; height: 80px; border-radius: 50%; background: var(--rose-pale); display: flex; align-items: center; justify-content: center; animation: pulse 2s ease-in-out infinite; position: relative; }
    .pulse-ring::before { content: ''; position: absolute; inset: -10px; border-radius: 50%; border: 1.5px solid var(--rose-light); animation: ringPulse 2s ease-in-out infinite; }
    .pulse-ring::after { content: ''; position: absolute; inset: -22px; border-radius: 50%; border: 1px solid var(--rose-light); opacity: 0.4; animation: ringPulse 2s ease-in-out infinite 0.3s; }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
    @keyframes ringPulse { 0%,100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.08); opacity: 0.2; } }
    .sofia-avatar-lg { width: 48px; height: 48px; border-radius: 50%; background: var(--rose-pale); display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 22px; color: var(--rose); font-style: italic; }
    .processing-text { font-family: 'Playfair Display', serif; font-size: 20px; font-style: italic; color: var(--charcoal); }
    .processing-dots span { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--rose-light); margin: 0 3px; animation: dotBounce 1.4s ease-in-out infinite; }
    .processing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .processing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotBounce { 0%,80%,100% { transform: translateY(0); opacity: 0.4; } 40% { transform: translateY(-8px); opacity: 1; } }

    .email-input { width: 100%; padding: 16px 20px; background: var(--card); border: 1.5px solid var(--border); border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--charcoal); margin-bottom: 14px; outline: none; transition: border-color 0.2s; }
    .email-input:focus { border-color: var(--rose-light); }
    .email-input::placeholder { color: var(--muted); }

    @media (max-width: 400px) { .page { padding: 0 16px 60px; } }
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect } = React;

const questions = [
  { id:1, text:"When you think about that relationship, your first emotion is...", options:[{text:"Relief that it's over",points:1,archetype:null},{text:"Confusion — you still don't fully understand what happened",points:1,archetype:"doubter"},{text:"Deep sadness, like you lost someone you loved",points:1,archetype:null},{text:"Anger — at them, at yourself, at everything",points:1,archetype:null}] },
  { id:2, text:"During the relationship, how often did you question your own memory or perception?", options:[{text:"Almost never",points:0,archetype:null},{text:"Sometimes — they'd point out things I 'misremembered'",points:1,archetype:"doubter"},{text:"Often — I started keeping notes to trust myself",points:1,archetype:"doubter"},{text:"Constantly — I stopped trusting my own mind",points:1,archetype:"doubter"}] },
  { id:3, text:"When they were upset, what did you do?", options:[{text:"Stood my ground calmly",points:0,archetype:null},{text:"Tried to explain myself",points:1,archetype:null},{text:"Immediately looked for what I did wrong",points:1,archetype:"fixer"},{text:"Went into full 'fix it' mode until they felt better",points:1,archetype:"fixer"}] },
  { id:4, text:"Did you ever feel like you were walking on eggshells?", options:[{text:"No, never",points:0,archetype:null},{text:"Occasionally, during arguments",points:0,archetype:null},{text:"Yes, regularly — I monitored their mood constantly",points:1,archetype:"survivor"},{text:"Yes, almost every day",points:1,archetype:"survivor"}] },
  { id:5, text:"How did the relationship affect your friendships and family?", options:[{text:"No real change",points:0,archetype:null},{text:"I became less available but kept my connections",points:0,archetype:null},{text:"I slowly drifted from people who 'didn't understand'",points:1,archetype:"survivor"},{text:"I became almost completely isolated",points:1,archetype:"survivor"}] },
  { id:6, text:"When the relationship ended (or you decided to leave), what stopped you or slowed you down?", options:[{text:"Nothing — I left when I was ready",points:0,archetype:null},{text:"Fear of being alone",points:1,archetype:null},{text:"Guilt — I felt responsible for their wellbeing",points:1,archetype:"fixer"},{text:"I didn't believe I could survive without them",points:1,archetype:null}] },
  { id:7, text:"After conflict, who usually apologized first?", options:[{text:"It varied — sometimes me, sometimes them",points:0,archetype:null},{text:"Usually me, even when I wasn't sure what I did wrong",points:1,archetype:"doubter"},{text:"Always me — I hated the silence or tension",points:1,archetype:null},{text:"Me, repeatedly, until they accepted it",points:1,archetype:"doubter"}] },
  { id:8, text:"Did your partner ever make you feel like their bad behavior was your fault?", options:[{text:"No",points:0,archetype:null},{text:"Occasionally, but I could see through it",points:0,archetype:null},{text:"Yes — and part of me believed it",points:1,archetype:"fixer"},{text:"Yes — I spent years trying to 'fix' myself for them",points:1,archetype:"fixer"}] },
  { id:9, text:"How do you feel about yourself now, after the relationship?", options:[{text:"Mostly okay — I'm processing it",points:0,archetype:null},{text:"Confused about who I am outside of that relationship",points:1,archetype:"doubter"},{text:"Like I lost myself somewhere along the way",points:1,archetype:"survivor"},{text:"I'm not sure I know who I am anymore",points:1,archetype:"survivor"}] },
  { id:10, text:"What do you most need right now?", options:[{text:"To understand what actually happened to me",points:1,archetype:"doubter"},{text:"To stop replaying everything and start healing",points:1,archetype:"survivor"},{text:"To figure out why I keep choosing relationships like this",points:1,archetype:"fixer"},{text:"All of the above",points:1,archetype:"all"}] },
];

const tiebreaker = {
  id:11, text:"If you're honest, which sentence feels most true?",
  options:[
    {text:"\"I always thought if I just loved them better, things would change.\"",archetype:"fixer"},
    {text:"\"I constantly questioned whether I was the problem.\"",archetype:"doubter"},
    {text:"\"I stayed way longer than I should have, and I don't know why.\"",archetype:"survivor"},
  ]
};

const TOTAL_QUESTIONS = 11;

function computeArchetype(answers) {
  const counts = { fixer:0, doubter:0, survivor:0 };
  for (let i = 0; i < Math.min(answers.length, 9); i++) {
    const a = answers[i];
    const q = questions[a.qIndex];
    if (!q) continue;
    const opt = q.options[a.optionIndex];
    if (opt && opt.archetype && opt.archetype !== "all") counts[opt.archetype]++;
  }
  const q10answer = answers.find(a => a.qIndex === 9);
  if (q10answer) {
    const opt = questions[9].options[q10answer.optionIndex];
    if (opt.archetype !== "all" && opt.archetype) counts[opt.archetype] += 3;
  }
  const max = Math.max(counts.fixer, counts.doubter, counts.survivor);
  const winners = Object.keys(counts).filter(k => counts[k] === max);
  if (winners.length === 1) return winners[0];
  return "tie";
}

function resolveArchetype(answers) {
  const base = computeArchetype(answers);
  if (base !== "tie") return base;
  const tbAnswer = answers[answers.length - 1];
  if (tbAnswer) return tiebreaker.options[tbAnswer.optionIndex].archetype;
  return "survivor";
}

function Header({ showBack, onBack, progress }) {
  return (
    <>
      {progress !== undefined && <div className="progress-bar-track"><div className="progress-bar-fill" style={{width:`${progress}%`}}/></div>}
      <div className="header" style={{paddingTop: progress !== undefined ? 28 : 24}}>
        {showBack && (
          <button className="back-btn" onClick={onBack}>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8L10 13" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
            Back
          </button>
        )}
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div className="sofia-avatar">S</div>
          <span className="brand-name">alma</span>
        </div>
      </div>
    </>
  );
}

function IntroScreen({ onStart }) {
  return (
    <>
      <Header progress={0}/>
      <div className="page">
        <div className="screen-enter" style={{paddingTop:48}}>
          <p className="intro-eyebrow">A message from Sofia</p>
          <h1 className="intro-headline">Was your relationship slowly destroying you —<em> or were you imagining it?</em></h1>
          <div className="intro-card">
            <p className="intro-card-quote">"Most women I speak with already know something was deeply wrong. What they need is language for it — and a way forward."</p>
            <p className="intro-card-name">— Sofia, your Alma guide</p>
          </div>
          <p className="intro-sub">Take this 2-minute quiz to find out what really happened — and what comes next.</p>
          <button className="btn-primary" onClick={onStart}>
            Start the Quiz
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8H13M13 8L8.5 3.5M13 8L8.5 12.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </button>
          <p className="meta-note">11 questions · Free · No signup required</p>
        </div>
      </div>
    </>
  );
}

function QuizScreen({ onComplete, onBack }) {
  const [qIndex, setQIndex] = useState(0);
  const [answers, setAnswers] = useState([]);
  const [selected, setSelected] = useState(null);
  const [showTiebreaker, setShowTiebreaker] = useState(false);
  const [animKey, setAnimKey] = useState(0);

  const currentQ = showTiebreaker ? tiebreaker : questions[qIndex];
  const displayNumber = showTiebreaker ? 11 : qIndex + 1;
  const progress = displayNumber / TOTAL_QUESTIONS * 100;

  function handleSelect(optionIndex) {
    if (selected !== null) return;
    setSelected(optionIndex);
    setTimeout(() => {
      const newAnswers = [...answers, {qIndex: showTiebreaker ? 10 : qIndex, optionIndex}];
      if (showTiebreaker) { onComplete(newAnswers); return; }
      if (qIndex < questions.length - 1) {
        setAnswers(newAnswers); setQIndex(qIndex+1); setSelected(null); setAnimKey(k=>k+1);
      } else {
        const arch = computeArchetype(newAnswers);
        if (arch === "tie") { setAnswers(newAnswers); setShowTiebreaker(true); setSelected(null); setAnimKey(k=>k+1); }
        else onComplete(newAnswers);
      }
    }, 420);
  }

  function handleBack() {
    if (showTiebreaker) { setShowTiebreaker(false); setSelected(null); setAnimKey(k=>k+1); setAnswers(answers.slice(0,-1)); return; }
    if (qIndex === 0) onBack();
    else { setQIndex(qIndex-1); setAnswers(answers.slice(0,-1)); setSelected(null); setAnimKey(k=>k+1); }
  }

  return (
    <>
      <Header showBack onBack={handleBack} progress={progress}/>
      <div className="page">
        <div key={animKey} className="screen-enter" style={{paddingTop:40}}>
          <p className="q-number">Question {displayNumber} of {TOTAL_QUESTIONS}</p>
          <h2 className="q-text">{currentQ.text}</h2>
          <div className="answer-options">
            {currentQ.options.map((opt,i) => (
              <button key={i} className={`answer-pill${showTiebreaker?' tiebreaker':''}${selected===i?' selected':''}`} onClick={()=>handleSelect(i)}>{opt.text}</button>
            ))}
          </div>
        </div>
      </div>
    </>
  );
}

const PROCESSING_STEPS = [
  "Reading your responses...",
  "Analyzing relationship patterns...",
  "Mapping emotional dynamics...",
  "Comparing with 14,000+ profiles...",
  "Identifying your pattern...",
];

function ProcessingScreen({ onDone }) {
  const [activeStep, setActiveStep] = useState(0);

  useEffect(() => {
    const timers = [];
    PROCESSING_STEPS.forEach((_, i) => {
      if (i === 0) return;
      timers.push(setTimeout(() => setActiveStep(i), i * 10000));
    });
    timers.push(setTimeout(() => onDone(), PROCESSING_STEPS.length * 10000));
    return () => timers.forEach(clearTimeout);
  }, []);

  return (
    <>
      <Header/>
      <div className="page">
        <div className="processing-wrap screen-enter">
          <div className="pulse-ring"><div className="sofia-avatar-lg">S</div></div>
          <p className="processing-text">{PROCESSING_STEPS[activeStep]}</p>
          <div style={{display:'flex',flexDirection:'column',gap:12,width:'100%',maxWidth:320,marginTop:16}}>
            {PROCESSING_STEPS.map((step, i) => (
              <div key={i} style={{
                display:'flex',
                alignItems:'center',
                gap:12,
                opacity: i <= activeStep ? 1 : 0.25,
                transition:'opacity 0.6s ease',
              }}>
                <div style={{
                  width:20,
                  height:20,
                  borderRadius:'50%',
                  background: i < activeStep ? 'var(--rose)' : i === activeStep ? 'var(--rose-pale)' : 'var(--border)',
                  border: i === activeStep ? '2px solid var(--rose)' : '2px solid transparent',
                  flexShrink:0,
                  display:'flex',
                  alignItems:'center',
                  justifyContent:'center',
                  transition:'all 0.6s ease',
                }}>
                  {i < activeStep && (
                    <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                      <path d="M2 5L4.5 7.5L8 3" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                    </svg>
                  )}
                </div>
                <span style={{
                  fontSize:13,
                  color: i <= activeStep ? 'var(--charcoal)' : 'var(--muted)',
                  fontWeight: i === activeStep ? 500 : 400,
                  transition:'all 0.6s ease',
                }}>{step}</span>
              </div>
            ))}
          </div>
          <div className="processing-dots"><span/><span/><span/></div>
        </div>
      </div>
    </>
  );
}

function EmailScreen({ answers, onSubmit }) {
  const [name, setName] = useState('');
  const [email, setEmail] = useState('');
  const [errors, setErrors] = useState({});
  const [loading, setLoading] = useState(false);
  const [serverError, setServerError] = useState('');

  function validate() {
    const e = {};
    if (!name.trim()) e.name = 'Please enter your first name.';
    if (!email || !email.includes('@')) e.email = 'Please enter a valid email address.';
    return e;
  }

  async function handleSubmit(ev) {
    ev.preventDefault();
    const e = validate();
    if (Object.keys(e).length) { setErrors(e); return; }
    setLoading(true);
    setServerError('');
    try {
      const res = await fetch('/api/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name.trim(), email, answers }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Something went wrong');
      onSubmit({ name: name.trim(), email });
    } catch (err) {
      setServerError('Something went wrong. Please try again.');
      setLoading(false);
    }
  }

  return (
    <>
      <Header progress={100}/>
      <div className="page">
        <div className="screen-enter" style={{paddingTop:52}}>
          <p className="intro-eyebrow">Almost there</p>
          <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:'clamp(26px,6vw,36px)',fontWeight:500,lineHeight:1.2,color:'var(--charcoal)',marginBottom:14}}>
            Where should Sofia send your results?
          </h2>
          <p style={{fontSize:15,color:'var(--muted)',lineHeight:1.65,marginBottom:32,textWrap:'pretty'}}>
            Your personalized pattern analysis will be sent to your inbox — including Sofia's full breakdown of what happened and what comes next.
          </p>

          <form onSubmit={handleSubmit} style={{display:'flex',flexDirection:'column',gap:12}}>
            <div>
              <input
                className="email-input"
                type="text"
                placeholder="Your first name"
                value={name}
                onChange={e=>{setName(e.target.value);setErrors(p=>({...p,name:''}));}}
                style={{marginBottom: errors.name ? 6 : 0}}
              />
              {errors.name && <p style={{fontSize:12,color:'var(--rose)',marginBottom:4}}>{errors.name}</p>}
            </div>
            <div>
              <input
                className="email-input"
                type="email"
                placeholder="your@email.com"
                value={email}
                onChange={e=>{setEmail(e.target.value);setErrors(p=>({...p,email:''}));}}
                style={{marginBottom: errors.email ? 6 : 0}}
              />
              {errors.email && <p style={{fontSize:12,color:'var(--rose)',marginBottom:4}}>{errors.email}</p>}
            </div>

            {serverError && <p style={{fontSize:13,color:'var(--rose)',textAlign:'center'}}>{serverError}</p>}

            <button type="submit" className="btn-primary" style={{marginTop:8}} disabled={loading}>
              {loading ? 'Sending...' : 'Send my results →'}
            </button>
            <p className="meta-note">No spam. Unsubscribe anytime. Your privacy is sacred.</p>
          </form>

          <div style={{marginTop:36,display:'flex',flexDirection:'column',gap:10}}>
            {[
              'Sofia personally reviews every pattern result',
              'Your answers are never shared or sold',
              '14,000+ women have received their results',
            ].map((t,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:10}}>
                <span style={{color:'var(--rose)',fontSize:12,flexShrink:0}}>✦</span>
                <p style={{fontSize:13,color:'var(--muted)',lineHeight:1.4}}>{t}</p>
              </div>
            ))}
          </div>
        </div>
      </div>
    </>
  );
}

function ConfirmationScreen({ name, email, onChangeEmail }) {
  return (
    <>
      <Header/>
      <div className="page">
        <div className="screen-enter" style={{paddingTop:64,textAlign:'center'}}>
          <div style={{width:72,height:72,borderRadius:'50%',background:'var(--rose-pale)',border:'2px solid var(--rose-light)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 28px',fontSize:30}}>
            ✉️
          </div>

          <p style={{fontSize:11,fontWeight:600,letterSpacing:'0.13em',textTransform:'uppercase',color:'var(--rose)',marginBottom:16}}>Check your inbox</p>
          <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:'clamp(24px,6vw,34px)',fontWeight:500,lineHeight:1.25,color:'var(--charcoal)',marginBottom:18,textWrap:'pretty'}}>
            {name ? `Your results are on their way, ${name}.` : 'Your results are on their way.'}
          </h2>

          <div style={{display:'inline-flex',alignItems:'center',gap:10,background:'var(--card)',border:'1px solid var(--border)',borderRadius:12,padding:'12px 18px',marginBottom:10}}>
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="1" y="3" width="13" height="9" rx="2" stroke="var(--muted)" strokeWidth="1.3"/><path d="M1 5L7.5 9L14 5" stroke="var(--muted)" strokeWidth="1.3" strokeLinecap="round"/></svg>
            <span style={{fontSize:14,color:'var(--charcoal)',fontWeight:500}}>{email}</span>
          </div>

          <div style={{marginBottom:32}}>
            <button onClick={onChangeEmail} style={{background:'none',border:'none',cursor:'pointer',fontSize:13,color:'var(--rose)',fontFamily:"'DM Sans',sans-serif",textDecoration:'underline',textUnderlineOffset:3,opacity:0.8}}>
              That's not right — change my email
            </button>
          </div>

          <p style={{fontSize:15,lineHeight:1.75,color:'var(--muted)',marginBottom:36,textWrap:'pretty'}}>
            Sofia has sent your full pattern breakdown to your inbox. It usually arrives within a few minutes — check your spam folder if you don't see it.
          </p>

          <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:16,padding:'22px 20px',textAlign:'left'}}>
            <p style={{fontSize:11,fontWeight:600,letterSpacing:'0.12em',textTransform:'uppercase',color:'var(--rose)',marginBottom:14}}>While you wait</p>
            {[
              'Take a breath — something just shifted for you.',
              'Be gentle with yourself today. You did something brave.',
              "If emotions come up, let them. That's healing beginning.",
            ].map((t,i)=>(
              <div key={i} style={{display:'flex',gap:12,alignItems:'flex-start',marginBottom:i<2?12:0}}>
                <span style={{color:'var(--rose)',fontSize:14,marginTop:1,flexShrink:0,opacity:0.7}}>✦</span>
                <p style={{fontSize:14,lineHeight:1.6,color:'var(--charcoal)'}}>{t}</p>
              </div>
            ))}
          </div>
        </div>
      </div>
    </>
  );
}

function App() {
  const [screen, setScreen] = useState(() => {
    const s = localStorage.getItem('alma_screen') || 'intro';
    return (s === 'processing' || s === 'confirmation') ? 'intro' : s;
  });
  const [answers, setAnswers] = useState([]);
  const [userName, setUserName] = useState('');
  const [userEmail, setUserEmail] = useState('');

  function goTo(s) { setScreen(s); localStorage.setItem('alma_screen', s); }

  function handleQuizComplete(ans) { setAnswers(ans); goTo('processing'); }

  function handleProcessingDone() { goTo('email'); }

  function handleEmailSubmit({ name, email }) {
    setUserName(name);
    setUserEmail(email);
    localStorage.setItem('alma_name', name);
    localStorage.setItem('alma_email', email);
    goTo('confirmation');
  }

  function handleChangeEmail() { goTo('email'); }

  return (
    <div>
      {screen==='intro' && <IntroScreen onStart={()=>goTo('quiz')}/>}
      {screen==='quiz' && <QuizScreen onComplete={handleQuizComplete} onBack={()=>goTo('intro')}/>}
      {screen==='processing' && <ProcessingScreen onDone={handleProcessingDone}/>}
      {screen==='email' && <EmailScreen answers={answers} onSubmit={handleEmailSubmit}/>}
      {screen==='confirmation' && <ConfirmationScreen name={userName} email={userEmail} onChangeEmail={handleChangeEmail}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body></html>
